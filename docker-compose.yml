version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: eldorado-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: eldorado
      POSTGRES_PASSWORD: eldorado_secret
      POSTGRES_DB: eldorado_erp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eldorado -d eldorado_erp"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: eldorado-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
